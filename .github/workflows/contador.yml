name: Actualizar Contador y Verificar Media

on:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Actualizar README
        run: |
          python3 << 'EOF'
          import os
          import re
          from pathlib import Path

          README_FILE = "README.md"
          MEDIA_DIR = "media"

          # 1. Contar Archivos y Carpetas
          files_count = 0
          folders_count = -1
          for root, dirs, files in os.walk("."):
              if ".git" in root.split(os.sep):
                  continue
              folders_count += len(dirs)
              files_count += len(files)

          # 2. Palabra Máxima
          palabra_max = 0
          if os.path.exists(MEDIA_DIR):
              for f in Path(MEDIA_DIR).rglob("*"):
                  if f.is_file():
                      match = re.match(r'^(\d+)', f.name)
                      if match:
                          palabra_max = max(palabra_max, int(match.group(1)))

          # 3. Calcular tamaños
          def get_size_mb(directory, extensions):
              total = 0
              if not os.path.exists(directory): return 0.0
              for f in Path(directory).rglob("*"):
                  if f.is_file() and f.suffix.lower() in extensions:
                      total += f.stat().st_size
              return total / (1024 * 1024)

          audio_exts = {'.mp3', '.ogg', '.wav', '.m4a'}
          image_exts = {'.webp', '.png', '.jpg', '.jpeg', '.gif', '.avif'}
          
          audio_size = get_size_mb(".", audio_exts)
          image_size = get_size_mb(".", image_exts)

          # 4. Leer README
          with open(README_FILE, "r", encoding="utf-8") as f:
              content = f.read()

          # 5. Actualizar Badges
          content = re.sub(r'Archivos-\d+-blue', f'Archivos-{files_count}-blue', content)
          content = re.sub(r'Carpetas-\d+-orange', f'Carpetas-{folders_count}-orange', content)
          content = re.sub(r'Palabra_Actual-\d+-purple', f'Palabra_Actual-{palabra_max}-purple', content)
          content = re.sub(r'Audios-[\d.]+MB-yellow', f'Audios-{audio_size:.2f}MB-yellow', content)
          content = re.sub(r'Imágenes-[\d.]+MB-success', f'Imágenes-{image_size:.2f}MB-success', content)

          # 6. Guardar README
          with open(README_FILE, "w", encoding="utf-8") as f:
              f.write(content)
              
          print("Proceso completado con éxito.")
          EOF

      - name: Guardar los cambios
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "🤖 auto-update: contadores y tamaños [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "No hubo cambios en el README, omitiendo commit."
          fi
